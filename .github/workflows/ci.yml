name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      # The committed vendor/ copy must match the chart.js version from npm,
      # so a Dependabot bump fails CI until `npm run sync-vendor` is re-run.
      - name: Check vendored Chart.js is in sync
        run: |
          npm run sync-vendor
          git diff --exit-code vendor/
