name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      # The committed vendor/ copy must match the chart.js version from npm,
      # so a Dependabot bump fails CI until `npm run sync-vendor` is re-run.
      - name: Check vendored Chart.js is in sync
        run: |
          npm run sync-vendor
          git diff --exit-code vendor/
