name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run test:coverage   # unit tests + 100% coverage gate on calculator.js
      - run: npm run lint
      # The committed vendor/ copy must match the chart.js version from npm,
      # so a Dependabot bump fails CI until `npm run sync-vendor` is re-run.
      - name: Check vendored Chart.js is in sync
        run: |
          npm run sync-vendor
          git diff --exit-code vendor/

      # Headless-browser tests (test/smoke.js + test/e2e.js). Playwright is
      # installed with --no-save so it stays out of package.json; the Chromium
      # download (~110 MB) is cached between runs, keyed by the pinned version below.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-1.60.0
      - run: npm install --no-save playwright@1.60.0
      - name: Install Chromium (+ OS deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Chromium OS deps (browser restored from cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: node test/smoke.js
      - run: node test/e2e.js
