<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spar- & Pensionsrechner</title>
  <link rel="stylesheet" href="style.css">
  <script src="vendor/chart.umd.js"></script>
</head>
<body>
  <header>
    <div>
      <h1 data-i18n="title">Spar- & Pensionsrechner</h1>
      <p class="subtitle" data-i18n="subtitle"></p>
    </div>
    <button id="langToggle" type="button" aria-label="Sprache wechseln / switch language">EN</button>
  </header>

  <main>
    <form id="inputs" autocomplete="off">

      <div class="form-grid">
      <section>
        <h2 data-i18n="savingsPhase"></h2>
        <div class="grid">
          <label>
            <span data-i18n="startingAmount"></span>
            <input type="number" id="startingAmount" min="0" step="500">
          </label>
          <label>
            <span data-i18n="startingCostBasis"></span>
            <input type="number" id="startingCostBasis" min="0" step="500">
            <small data-i18n="startingCostBasisHint"></small>
          </label>
          <label>
            <span data-i18n="monthlyContribution"></span>
            <input type="number" id="monthlyContribution" min="0" step="50">
          </label>
          <label>
            <span data-i18n="contributionIncrease"></span>
            <span class="inline">
              <input type="number" id="contributionIncreaseValue" min="0" step="0.5">
              <select id="contributionIncreaseUnit">
                <option value="percent" data-i18n="increasePercent"></option>
                <option value="amount" data-i18n="increaseAmount"></option>
              </select>
            </span>
          </label>
          <label>
            <span data-i18n="yearsToRetirement"></span>
            <input type="number" id="yearsToRetirement" min="1" max="80" step="1">
          </label>
        </div>
      </section>

      <section>
        <h2 data-i18n="retirementPhase"></h2>
        <div class="grid">
          <label>
            <span data-i18n="monthlyWithdrawal"></span>
            <input type="number" id="monthlyWithdrawal" min="0" step="100">
          </label>
        </div>
        <label class="checkbox">
          <input type="checkbox" id="withdrawalInflationAdjusted">
          <span data-i18n="withdrawalInflationAdjusted"></span>
        </label>

        <h3 class="subhead" data-i18n="targetSection"></h3>
        <div class="grid">
          <label>
            <span data-i18n="goalType"></span>
            <select id="goalType">
              <option value="amount" data-i18n="goalTypeAmount"></option>
              <option value="stableValue" data-i18n="goalTypeStable"></option>
            </select>
          </label>
          <label id="targetAmountRow">
            <span data-i18n="targetAmount"></span>
            <input type="number" id="targetAmount" min="0" step="50000">
            <small data-i18n="targetAmountHint"></small>
          </label>
        </div>
        <p class="hint hidden" id="goalStableHint" data-i18n="goalTypeStableHint"></p>
      </section>
      </div>

      <details id="portfolioSection">
        <summary data-i18n="portfolio"></summary>
        <div class="table-wrap">
          <table id="allocationTable">
            <thead>
              <tr>
                <th data-i18n="asset"></th>
                <th data-i18n="allocationStart"></th>
                <th data-i18n="allocation"></th>
                <th class="late-col hidden"><span data-i18n="allocationLate"></span> <span class="switch-year-label"></span></th>
                <th data-i18n="withdrawalShare"></th>
                <th data-i18n="annualReturn"></th>
                <th data-i18n="volatility"></th>
                <th data-i18n="dividendYield"></th>
                <th data-i18n="ter"></th>
                <th class="age-col hidden" data-i18n="ageRate"></th>
              </tr>
            </thead>
            <tbody>
              <tr data-asset="etf">
                <td data-i18n="assetEtf"></td>
                <td><input type="number" data-field="allocationStart" min="0" max="100" step="5"></td>
                <td><input type="number" data-field="allocation" min="0" max="100" step="5"></td>
                <td class="late-col hidden"><input type="number" data-field="allocationLate" min="0" max="100" step="5"></td>
                <td><input type="number" data-field="withdrawalShare" min="0" max="100" step="5"></td>
                <td><input type="number" data-field="annualReturn" step="0.1"></td>
                <td><input type="number" data-field="volatility" min="0" step="1"></td>
                <td><input type="number" data-field="dividendYield" min="0" step="0.1"></td>
                <td><input type="number" data-field="ter" min="0" step="0.05"></td>
                <td class="age-col hidden"><input type="number" data-field="ageRate" min="0" step="0.1"></td>
              </tr>
              <tr data-asset="bonds">
                <td data-i18n="assetBonds"></td>
                <td><input type="number" data-field="allocationStart" min="0" max="100" step="5"></td>
                <td><input type="number" data-field="allocation" min="0" max="100" step="5"></td>
                <td class="late-col hidden"><input type="number" data-field="allocationLate" min="0" max="100" step="5"></td>
                <td><input type="number" data-field="withdrawalShare" min="0" max="100" step="5"></td>
                <td><input type="number" data-field="annualReturn" step="0.1"></td>
                <td><input type="number" data-field="volatility" min="0" step="1"></td>
                <td><input type="number" data-field="dividendYield" min="0" step="0.1"></td>
                <td><input type="number" data-field="ter" min="0" step="0.05"></td>
                <td class="age-col hidden"><input type="number" data-field="ageRate" min="0" step="0.1"></td>
              </tr>
              <tr data-asset="stocks">
                <td data-i18n="assetStocks"></td>
                <td><input type="number" data-field="allocationStart" min="0" max="100" step="5"></td>
                <td><input type="number" data-field="allocation" min="0" max="100" step="5"></td>
                <td class="late-col hidden"><input type="number" data-field="allocationLate" min="0" max="100" step="5"></td>
                <td><input type="number" data-field="withdrawalShare" min="0" max="100" step="5"></td>
                <td><input type="number" data-field="annualReturn" step="0.1"></td>
                <td><input type="number" data-field="volatility" min="0" step="1"></td>
                <td><input type="number" data-field="dividendYield" min="0" step="0.1"></td>
                <td><input type="number" data-field="ter" min="0" step="0.05"></td>
                <td class="age-col hidden"><input type="number" data-field="ageRate" min="0" step="0.1"></td>
              </tr>
              <tr data-asset="dividendStocks">
                <td data-i18n="assetDividendStocks"></td>
                <td><input type="number" data-field="allocationStart" min="0" max="100" step="5"></td>
                <td><input type="number" data-field="allocation" min="0" max="100" step="5"></td>
                <td class="late-col hidden"><input type="number" data-field="allocationLate" min="0" max="100" step="5"></td>
                <td><input type="number" data-field="withdrawalShare" min="0" max="100" step="5"></td>
                <td><input type="number" data-field="annualReturn" step="0.1"></td>
                <td><input type="number" data-field="volatility" min="0" step="1"></td>
                <td><input type="number" data-field="dividendYield" min="0" step="0.1"></td>
                <td><input type="number" data-field="ter" min="0" step="0.05"></td>
                <td class="age-col hidden"><input type="number" data-field="ageRate" min="0" step="0.1"></td>
              </tr>
            </tbody>
            <tfoot>
              <tr>
                <td data-i18n="sum"></td>
                <td id="allocationStartSum"></td>
                <td id="allocationSum"></td>
                <td class="late-col hidden" id="allocationLateSum"></td>
                <td id="withdrawalShareSum"></td>
                <td colspan="4"></td>
                <td class="age-col hidden"></td>
              </tr>
            </tfoot>
          </table>
        </div>
        <p class="hint" data-i18n="withdrawalShareHint"></p>
        <p id="allocationWarning" class="warning hidden"></p>

        <label class="checkbox">
          <input type="checkbox" id="allocationSwitchEnabled">
          <span data-i18n="allocationSwitch"></span>
        </label>
        <label class="indent" id="allocationSwitchYearRow">
          <span data-i18n="allocationSwitchYear"></span>
          <input type="number" id="allocationSwitchYear" min="1" max="80" step="1" class="small-input">
          <small data-i18n="allocationSwitchHint"></small>
        </label>

        <label class="checkbox">
          <input type="checkbox" id="reinvestDividends">
          <span data-i18n="reinvestDividends"></span>
        </label>
      </details>

      <details id="parametersSection">
        <summary data-i18n="parameters"></summary>
        <div class="grid">
          <label>
            <span data-i18n="kest"></span>
            <input type="number" id="kest" min="0" max="100" step="0.5">
          </label>
          <label>
            <span data-i18n="inflation"></span>
            <input type="number" id="inflation" min="0" step="0.1">
          </label>
          <label>
            <span data-i18n="scenarioSpread"></span>
            <input type="number" id="scenarioSpread" min="0" step="0.5">
            <small data-i18n="scenarioSpreadHint"></small>
          </label>
          <label>
            <span data-i18n="maxRetirementYears"></span>
            <input type="number" id="maxRetirementYears" min="1" max="100" step="1">
          </label>
          <label>
            <span data-i18n="monteCarloRuns"></span>
            <input type="number" id="monteCarloRuns" min="1" max="10000" step="100">
            <small data-i18n="monteCarloRunsHint"></small>
          </label>
        </div>
        <label class="checkbox">
          <input type="checkbox" id="ageEnabled">
          <span data-i18n="ageEnabled"></span>
          <button type="button" class="info-icon" data-info-target="ageInfo" aria-label="Info" aria-expanded="false">ⓘ</button>
        </label>
        <p class="info-box hidden" id="ageInfo" data-i18n="ageInfo"></p>
        <label class="checkbox">
          <input type="checkbox" id="displayReal">
          <span data-i18n="displayReal"></span>
        </label>
      </details>
    </form>

    <section class="chart-section">
      <h2 data-i18n="mcTitle"></h2>
      <p class="hint" data-i18n="mcIntro"></p>
      <button type="button" id="runMonteCarlo" data-i18n="mcRun"></button>
      <div id="mcResults" class="hidden">
        <label class="checkbox chart-option">
          <input type="checkbox" id="mcLogScale" checked>
          <span data-i18n="chartLogScale"></span>
        </label>
        <div class="chart-wrap">
          <canvas id="monteCarloChart"></canvas>
        </div>
        <section id="mcSummary" class="summary"></section>
        <div id="mcPercentileCards" class="summary"></div>
        <div id="mcExtremes" class="mc-extremes"></div>
        <div id="mcGoal">
          <h3 data-i18n="mcGoalTitle"></h3>
          <label class="mc-goal-select">
            <span data-i18n="mcGoalSelect"></span>
            <select id="mcGoalPercentile"></select>
          </label>
          <p id="mcGoalIntro"></p>
          <p class="hint" data-i18n="mcGoalNote"></p>
          <div class="table-wrap">
            <table id="mcGoalTable"></table>
          </div>
        </div>
      </div>
    </section>

    <div class="chart-grid">
      <section class="chart-section">
        <h2 data-i18n="chartTitle"></h2>
        <label class="checkbox chart-option">
          <input type="checkbox" id="logScale">
          <span data-i18n="chartLogScale"></span>
        </label>
        <div class="chart-wrap">
          <canvas id="chart"></canvas>
        </div>
      </section>

      <section class="chart-section">
        <h2 data-i18n="assetChartTitle"></h2>
        <div class="chart-wrap">
          <canvas id="assetChart"></canvas>
        </div>
      </section>
    </div>

    <section id="summary" class="summary"></section>

    <div class="results-grid">
      <section>
        <h2 data-i18n="targetTitle"></h2>
        <p id="targetIntro"></p>
        <div class="table-wrap">
          <table id="targetTable"></table>
        </div>
      </section>

      <section>
        <h2 data-i18n="perAssetAtRetirement"></h2>
        <h3 class="subhead" data-i18n="withdrawalBreakdownTitle"></h3>
        <div class="table-wrap">
          <table id="withdrawalTable"></table>
        </div>
        <h3 class="subhead" data-i18n="pieAllocationTitle"></h3>
        <div class="table-wrap">
          <table id="perAssetTable"></table>
        </div>
      </section>
    </div>

    <section>
      <h2 data-i18n="pieTitle"></h2>
      <div class="pie-row">
        <figure class="pie-fig">
          <figcaption data-i18n="piePaidInVsGrowth"></figcaption>
          <div class="pie-wrap"><canvas id="pieChart"></canvas></div>
        </figure>
        <figure class="pie-fig">
          <figcaption data-i18n="pieAllocationTitle"></figcaption>
          <div class="pie-wrap"><canvas id="allocationPie"></canvas></div>
        </figure>
      </div>
    </section>

    <div class="storage-row">
      <label class="checkbox">
        <input type="checkbox" id="saveInputs">
        <span data-i18n="saveInputs"></span>
      </label>
      <span class="button-row">
        <button type="button" id="exportInputs" data-i18n="exportInputs"></button>
        <button type="button" id="importInputs" data-i18n="importInputs"></button>
        <input type="file" id="importFile" accept="application/json,.json" class="hidden">
        <button type="button" id="resetDefaults" data-i18n="resetDefaults"></button>
      </span>
    </div>
  </main>

  <footer>
    <p data-i18n="disclaimer"></p>
  </footer>

  <script src="i18n.js"></script>
  <script src="calculator.js"></script>
  <script src="app.js"></script>
</body>
</html>
